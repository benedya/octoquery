services:
  demo-postgres:
    image: postgres:17-alpine
    container_name: octoquery-demo-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: octoquery
      POSTGRES_PASSWORD: octoquery
    ports:
      - "45432:5432"
    volumes:
      - ./init-postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octoquery -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  demo-mysql:
    image: mysql:8
    container_name: octoquery-demo-mysql
    environment:
      MYSQL_DATABASE: blog
      MYSQL_USER: octoquery
      MYSQL_PASSWORD: octoquery
      MYSQL_ROOT_PASSWORD: octoquery-root
    ports:
      - "43306:3306"
    volumes:
      - ./init-mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20

  demo-mariadb:
    image: mariadb:11
    container_name: octoquery-demo-mariadb
    environment:
      MARIADB_DATABASE: library
      MARIADB_USER: octoquery
      MARIADB_PASSWORD: octoquery
      MARIADB_ROOT_PASSWORD: octoquery-root
    ports:
      - "43307:3306"
    volumes:
      - ./init-mariadb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  # The SQL Server image is amd64-only (runs under emulation on ARM hosts) and
  # has no init-script mechanism, so the command starts the server, waits for
  # it, and applies the init scripts itself. The healthcheck targets the
  # helpdesk database, so the service turns healthy only after seeding.
  demo-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: octoquery-demo-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OctoQuery1!"
    ports:
      - "41433:1433"
    volumes:
      - ./init-mssql:/init:ro
    command: >
      /bin/bash -c "/opt/mssql/bin/sqlservr &
      until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' -b >/dev/null 2>&1; do sleep 2; done;
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -i /init/01_schema.sql -i /init/02_seed.sql;
      wait"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -d helpdesk -Q 'SELECT 1' -b"]
      interval: 5s
      timeout: 5s
      retries: 40
